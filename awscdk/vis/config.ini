[main]
account_id = 123456789012
region = us-east-1
vpc_id = vpc-0123456789abcdef0
resource_prefix = datacommons-vis
tier = dev
program = datacommons
project = vis
tags = ManagedBy:aws-cdk,Project:vis,Region:us-east-1

#[iam]
#role_prefix = power-user
#permission_boundary = arn:aws:iam::123456789012:policy/PermissionBoundary_PowerUser

[alb]
internet_facing = true
certificate_arn = arn:aws:acm:us-east-1:123456789012:certificate/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
log_bucket_arn = arn:aws:s3:::my-alb-access-logs-bucket

[db]
db_user = phoenix
db_pass = changeme
db_name = phoenix

[phoenix]
image = arizephoenix/phoenix:latest
port = 6006
cpu = 512
memory = 1024
health_check_path = /healthz
health_check_timeout = 10
health_check_interval = 30
path = /*
priority_rule_number = 10
phoenix_secret = changeme-phoenix-secret
phoenix_admin_password = changeme-admin-password
# Optional: override the container entrypoint
# entry_point = /bin/sh -c "your command here"
